<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Acompanhe seu Veículo</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#1a2332;--amber:#f59e0b;--amber2:#fbbf24;--green:#10b981;--yellow:#f59e0b;--red:#ef4444;--blue:#3b82f6;--bg:#f0f2f5;--card:#ffffff;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;--radius:0.85rem}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text)}
.hidden{display:none!important}

/* HERO */
.hero{background:var(--navy);padding:2.5rem 1.25rem 2rem;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 70% 50%,rgba(245,158,11,.18) 0%,transparent 60%)}
.hero-icon{font-size:2.5rem;margin-bottom:.5rem;position:relative;z-index:1}
.hero-title{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;color:#fff;position:relative;z-index:1}
.hero-title span{color:var(--amber)}
.hero-sub{color:rgba(255,255,255,.5);font-size:.88rem;margin-top:.35rem;margin-bottom:1.75rem;position:relative;z-index:1}

/* SEARCH */
.search-wrap{position:relative;z-index:1}
.search-tabs{display:flex;gap:.5rem;justify-content:center;margin-bottom:.85rem}
.search-tab{padding:.4rem 1rem;border-radius:999px;border:1.5px solid rgba(255,255,255,.2);background:none;color:rgba(255,255,255,.6);font-size:.82rem;font-weight:600;cursor:pointer;transition:.2s}
.search-tab.active{background:var(--amber);border-color:var(--amber);color:var(--navy)}
.search-box{display:flex;gap:.5rem;align-items:center;max-width:420px;margin:0 auto}
.search-input{flex:1;padding:.8rem 1rem;border-radius:.65rem;border:1.5px solid rgba(255,255,255,.15);background:rgba(255,255,255,.1);color:#fff;font-size:1rem;font-family:'DM Sans',sans-serif;outline:none;transition:.2s}
.search-input::placeholder{color:rgba(255,255,255,.4)}
.search-input:focus{border-color:var(--amber);background:rgba(245,158,11,.08)}
.btn-search{padding:.8rem 1.2rem;background:var(--amber);border:none;border-radius:.65rem;color:var(--navy);font-weight:700;font-size:.95rem;cursor:pointer;transition:.2s;white-space:nowrap}
.btn-search:active{background:var(--amber2);transform:scale(.97)}

/* CONTEÚDO */
.container{max-width:560px;margin:0 auto;padding:1.25rem 1rem}
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:.85rem}
.card-header{padding:.85rem 1.1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-family:'Syne',sans-serif;font-size:.92rem;font-weight:700}
.card-body{padding:1.1rem}

/* TABS */
.tabs{display:flex;gap:.3rem;background:#f1f5f9;padding:.3rem;border-radius:.6rem;margin-bottom:1rem}
.tab{flex:1;padding:.5rem .5rem;border-radius:.45rem;border:none;background:none;cursor:pointer;font-size:.78rem;font-weight:600;color:var(--muted);transition:.2s;text-align:center}
.tab.active{background:var(--card);color:var(--navy);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.tab-content{display:none}
.tab-content.active{display:block}

/* BADGES */
.badge{display:inline-block;padding:.28rem .65rem;border-radius:999px;font-size:.72rem;font-weight:700;line-height:1}
.badge-na-fila{background:#f1f5f9;color:#64748b}
.badge-manutencao{background:#dbeafe;color:#1d4ed8}
.badge-aguardando{background:#ffedd5;color:#c2410c}
.badge-pronto{background:#d1fae5;color:#065f46}
.badge-pago{background:#064e3b;color:#a7f3d0}
.badge-cancelado{background:#fee2e2;color:#b91c1c}
.badge-novo{background:#f1f5f9;color:#64748b}
.badge-vip{background:#fef3c7;color:#92400e}

/* STATUS DESTAQUE */
.status-destaque{border-radius:var(--radius);padding:1.25rem;margin-bottom:.85rem;text-align:center}
.status-destaque.na_fila{background:#f8fafc;border:2px solid #cbd5e1}
.status-destaque.em_manutencao{background:#eff6ff;border:2px solid #93c5fd}
.status-destaque.aguardando_peca{background:#fff7ed;border:2px solid #fdba74}
.status-destaque.pronto_retirada{background:#f0fdf4;border:2px solid #86efac}
.status-destaque.pago{background:#f0fdf4;border:2px solid #86efac}
.status-emoji{font-size:2.5rem;margin-bottom:.35rem}
.status-titulo{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;margin-bottom:.2rem}
.status-sub{font-size:.82rem;color:var(--muted)}

/* OS CARD */
.os-item{padding:.85rem 1.1rem;border-bottom:1px solid var(--border)}
.os-item:last-child{border-bottom:none}
.os-num{font-family:'Syne',sans-serif;font-size:.88rem;font-weight:700}
.os-data{font-size:.75rem;color:var(--muted);margin-top:.1rem}
.os-servicos{margin-top:.5rem}
.os-servico-row{font-size:.82rem;color:var(--muted);display:flex;align-items:center;gap:.35rem;margin-top:.2rem}
.os-total{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;color:var(--green)}

/* PREVENTIVO */
.prev-item{display:flex;align-items:center;gap:.75rem;padding:.75rem 1.1rem;border-bottom:1px solid var(--border)}
.prev-item:last-child{border-bottom:none}
.prev-dot{width:.55rem;height:.55rem;border-radius:50%;flex-shrink:0}
.prev-nome{font-weight:600;font-size:.88rem}
.prev-data{font-size:.75rem;color:var(--muted);margin-top:.1rem}
.prev-badge{margin-left:auto;flex-shrink:0}

/* AVALIAÇÃO */
.star-wrap{display:flex;gap:.5rem;justify-content:center;margin:.75rem 0}
.star-btn{font-size:2rem;background:none;border:none;cursor:pointer;transition:.2s;line-height:1;opacity:.35}
.star-btn.ativo{opacity:1}
.star-btn:hover{transform:scale(1.2);opacity:1}

/* VEIC CARD */
.veic-card{display:flex;align-items:center;gap:.85rem;padding:.85rem 1.1rem;cursor:pointer;transition:.15s;border-bottom:1px solid var(--border)}
.veic-card:last-child{border-bottom:none}
.veic-card:active{background:#f8fafc}
.veic-placa{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:800;background:var(--navy);color:#fff;padding:.25rem .6rem;border-radius:.4rem;letter-spacing:.06em}
.veic-info{flex:1}
.veic-nome{font-weight:600;font-size:.9rem}
.veic-sub{font-size:.75rem;color:var(--muted);margin-top:.1rem}

/* BOTÕES */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;padding:.7rem 1.2rem;border-radius:.65rem;border:none;font-size:.9rem;font-weight:600;cursor:pointer;transition:.15s;font-family:'DM Sans',sans-serif;text-decoration:none}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--amber);color:var(--navy)}
.btn-whatsapp{background:#25d366;color:#fff}
.btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.btn-full{width:100%;display:flex}
.btn-outline{background:none;border:1.5px solid var(--border);color:var(--muted)}

/* SAUDAÇÃO */
.saudacao{padding:1.1rem;display:flex;align-items:center;justify-content:space-between}
.saudacao-nome{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800}
.saudacao-sub{font-size:.8rem;color:var(--muted);margin-top:.1rem}

/* LOADING / EMPTY */
.loading{text-align:center;padding:2.5rem;color:var(--muted)}
.loading-spin{font-size:1.5rem;animation:spin .8s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:2rem;color:var(--muted)}
.empty-icon{font-size:2.5rem;margin-bottom:.5rem}
.empty-msg{font-size:.88rem}

/* ALERT */
.alert{padding:.85rem 1rem;border-radius:.65rem;font-size:.85rem;margin-bottom:.85rem}
.alert-success{background:#d1fae5;color:#065f46;border-left:4px solid var(--green)}
.alert-warning{background:#fef3c7;color:#92400e;border-left:4px solid var(--yellow)}
.alert-info{background:#dbeafe;color:#1d4ed8;border-left:4px solid var(--blue)}

/* TOAST */
#toast{position:fixed;bottom:1.5rem;left:1rem;right:1rem;max-width:480px;margin:0 auto;padding:.85rem 1.1rem;border-radius:.75rem;font-size:.9rem;font-weight:600;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.2);text-align:center}
#toast.success{background:#0f172a;color:#a7f3d0;border-left:4px solid var(--green)}
#toast.error{background:#0f172a;color:#fca5a5;border-left:4px solid var(--red)}

/* BACK BTN */
.back-bar{display:flex;align-items:center;gap:.6rem;padding:.85rem 1rem;background:var(--card);border-bottom:1px solid var(--border);cursor:pointer}
.back-bar span{font-size:.88rem;font-weight:600;color:var(--muted)}

/* FOOTER */
.footer{text-align:center;padding:2rem 1rem;color:var(--muted);font-size:.78rem}

/* PRINT */
@media print{.hero,.back-bar,.btn-whatsapp,.star-wrap,#toast{display:none!important}.container{padding:0}}
</style>
</head>
<body>

<!-- ═══ HERO / BUSCA ══════════════════════════════════════ -->
<div id="tela-busca">
  <div class="hero">
    <div class="hero-icon">🔧</div>
    <div class="hero-title">Oficina <span>Online</span></div>
    <div class="hero-sub">Acompanhe seu veículo em tempo real</div>

    <div class="search-wrap">
      <div class="search-tabs">
        <button class="search-tab active" id="tab-cpf" onclick="setModo('cpf')">🪪 Buscar por CPF</button>
        <button class="search-tab" id="tab-placa" onclick="setModo('placa')">🚗 Buscar por Placa</button>
      </div>
      <div class="search-box">
        <input class="search-input" type="text" id="busca-input"
          placeholder="000.000.000-00" inputmode="text" autocomplete="off"
          onkeyup="if(event.key==='Enter')doBusca()">
        <button class="btn-search" onclick="doBusca()">Buscar</button>
      </div>
      <div id="busca-erro" style="color:#fca5a5;font-size:.82rem;margin-top:.75rem;min-height:1.2rem;text-align:center"></div>
    </div>
  </div>
  <div id="busca-resultado"></div>
  <div class="footer">Dúvidas? Fale com a gente pelo WhatsApp</div>
</div>

<!-- ═══ CLIENTE (lista veículos) ════════════════════════ -->
<div id="tela-cliente" class="hidden">
  <div class="back-bar" onclick="voltarBusca()">
    <span>←</span><span>Nova busca</span>
  </div>
  <div class="container">
    <div id="cliente-header"></div>
    <div id="cliente-veiculos"></div>
  </div>
</div>

<!-- ═══ VEÍCULO (detalhe completo) ══════════════════════ -->
<div id="tela-veiculo" class="hidden">
  <div class="back-bar" id="back-veiculo" onclick="voltarCliente()">
    <span>←</span><span id="back-veiculo-label">Voltar</span>
  </div>
  <div class="container">
    <div id="veiculo-content"></div>
  </div>
</div>

<div id="toast" class="hidden"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://phmtiulbrlnwjllcrjcf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBobXRpdWxicmxud2psbGNyamNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NjgwODksImV4cCI6MjA5MDU0NDA4OX0.vsM7EZckDErY4rGLM-BTfmthW4ern9sT1TnIN6FT4ss';

let _sb = null;
function getSB(){ if(!_sb) _sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY); return _sb; }

// ── HELPERS ───────────────────────────────────────────────
const brl    = v => 'R$\u00a0' + Math.abs(Number(v)||0).toLocaleString('pt-BR',{minimumFractionDigits:2});
const brData = iso => { if(!iso) return '—'; const p=iso.substring(0,10).split('-'); return `${p[2]}/${p[1]}/${p[0]}`; };
const maskCPF= v => v.replace(/\D/g,'').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d{1,2})$/,'$1-$2');
const isoHoje= () => new Date().toISOString().substring(0,10);

let _toastTimer;
function toast(msg, tipo='success'){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=`toast ${tipo}`;
  el.classList.remove('hidden');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>el.classList.add('hidden'),3500);
}

// ── MODO BUSCA ─────────────────────────────────────────────
let _modo = 'cpf';
function setModo(m){
  _modo = m;
  document.getElementById('tab-cpf').classList.toggle('active', m==='cpf');
  document.getElementById('tab-placa').classList.toggle('active', m==='placa');
  const inp = document.getElementById('busca-input');
  inp.value = '';
  inp.placeholder = m==='cpf' ? '000.000.000-00' : 'ABC-1234';
  inp.inputMode = m==='cpf' ? 'numeric' : 'text';
  document.getElementById('busca-erro').textContent = '';
  document.getElementById('busca-resultado').innerHTML = '';
}

document.getElementById('busca-input').addEventListener('input', function(){
  if(_modo==='cpf') this.value = maskCPF(this.value);
  else this.value = this.value.toUpperCase().replace(/[^A-Z0-9\-]/g,'');
});

// ── BUSCA ──────────────────────────────────────────────────
async function doBusca(){
  const q = document.getElementById('busca-input').value.trim();
  const erroEl = document.getElementById('busca-erro');
  erroEl.textContent = '';
  if(!q){ erroEl.textContent = 'Digite um CPF ou placa para buscar.'; return; }

  document.getElementById('busca-resultado').innerHTML =
    '<div class="loading" style="color:rgba(255,255,255,.6)"><div class="loading-spin">⏳</div></div>';

  if(_modo === 'placa'){
    await buscarPorPlaca(q);
  } else {
    await buscarPorCPF(q);
  }
}

async function buscarPorCPF(cpf){
  const sb = getSB();
  const clean = cpf.replace(/\D/g,'');
  if(clean.length < 11){ document.getElementById('busca-erro').textContent = 'CPF inválido.'; document.getElementById('busca-resultado').innerHTML=''; return; }

  const {data:cli} = await sb.from('clientes').select('*').ilike('cpf','%'+clean+'%').limit(1).single();
  document.getElementById('busca-resultado').innerHTML = '';

  if(!cli){
    document.getElementById('busca-resultado').innerHTML = `
      <div style="padding:1.5rem 1rem;text-align:center">
        <div class="empty" style="color:rgba(255,255,255,.6)">
          <div class="empty-icon">😕</div>
          <div class="empty-msg">CPF não encontrado no sistema.<br>Entre em contato com a oficina.</div>
        </div>
      </div>`;
    return;
  }
  mostrarCliente(cli);
}

async function buscarPorPlaca(placa){
  const sb = getSB();
  const p = placa.replace(/[^A-Z0-9]/g,'');
  const {data:veic} = await sb.from('veiculos').select('*,clientes(*)').ilike('placa','%'+p+'%').limit(1).single();
  document.getElementById('busca-resultado').innerHTML = '';

  if(!veic){
    document.getElementById('busca-resultado').innerHTML = `
      <div style="padding:1.5rem 1rem;text-align:center">
        <div class="empty" style="color:rgba(255,255,255,.6)">
          <div class="empty-icon">🚗</div>
          <div class="empty-msg">Placa não encontrada no sistema.<br>Entre em contato com a oficina.</div>
        </div>
      </div>`;
    return;
  }
  // Ir direto para o veículo
  abrirVeiculo(veic, veic.clientes);
}

// ── TELA CLIENTE ───────────────────────────────────────────
let _clienteAtual = null;

async function mostrarCliente(cli){
  _clienteAtual = cli;
  const sb = getSB();
  const {data:veics} = await sb.from('veiculos').select('*').eq('cliente_id', cli.id).order('created_at');

  // Verificar OS ativas
  const {data:osAtivas} = await sb.from('ordens_servico')
    .select('id,numero,status,veiculos(placa,modelo)')
    .eq('cliente_id', cli.id)
    .in('status',['na_fila','em_manutencao','aguardando_peca','pronto_retirada'])
    .order('data_entrada',{ascending:false});

  const statusInfo = {
    'na_fila':       {emoji:'🕐', txt:'Na Fila',             cor:'na_fila'},
    'em_manutencao': {emoji:'🔧', txt:'Em Manutenção',       cor:'em_manutencao'},
    'aguardando_peca':{emoji:'⏳',txt:'Aguardando Peça',     cor:'aguardando_peca'},
    'pronto_retirada':{emoji:'✅',txt:'Pronto para Retirada!',cor:'pronto_retirada'},
  };

  let osAtivasHtml = '';
  if(osAtivas && osAtivas.length > 0){
    osAtivasHtml = osAtivas.map(os => {
      const s = statusInfo[os.status] || {emoji:'🔧',txt:os.status,cor:''};
      return `
        <div class="status-destaque ${s.cor}" onclick="abrirVeiculoPorOS('${os.id}')">
          <div class="status-emoji">${s.emoji}</div>
          <div class="status-titulo">${s.txt}</div>
          <div class="status-sub">🚗 ${os.veiculos?.placa||''} ${os.veiculos?.modelo||''} — OS ${os.numero}</div>
          ${os.status==='pronto_retirada'?'<div style="margin-top:.5rem;font-size:.82rem;font-weight:600;color:#065f46">Seu carro está pronto! Venha buscar 🎉</div>':''}
          <div style="font-size:.75rem;color:var(--muted);margin-top:.35rem">Toque para ver detalhes →</div>
        </div>`;
    }).join('');
  }

  document.getElementById('cliente-header').innerHTML = `
    <div class="saudacao">
      <div>
        <div class="saudacao-nome">Olá, ${cli.nome.split(' ')[0]}! 👋</div>
        <div class="saudacao-sub">${cli.cpf||''} • <span class="badge badge-${cli.status||'novo'}">${(cli.status||'novo').toUpperCase()}</span></div>
      </div>
    </div>
    ${osAtivasHtml}
  `;

  document.getElementById('cliente-veiculos').innerHTML = `
    <div class="card">
      <div class="card-header">
        <div class="card-title">🚗 Seus Veículos</div>
      </div>
      ${(veics||[]).length === 0
        ? '<div class="empty" style="padding:1.5rem"><div class="empty-msg">Nenhum veículo cadastrado.</div></div>'
        : (veics||[]).map(v=>`
          <div class="veic-card" onclick="abrirVeiculo(${JSON.stringify(v).replace(/"/g,'&quot;')}, ${JSON.stringify(cli).replace(/"/g,'&quot;')})">
            <div class="veic-placa">${v.placa}</div>
            <div class="veic-info">
              <div class="veic-nome">${v.marca||''} ${v.modelo||''} ${v.ano||''}</div>
              <div class="veic-sub">${v.cor||''} ${v.combustivel?'• '+v.combustivel:''}</div>
            </div>
            <span style="color:var(--muted)">›</span>
          </div>`).join('')}
    </div>
  `;

  document.getElementById('tela-busca').classList.add('hidden');
  document.getElementById('tela-cliente').classList.remove('hidden');
  document.getElementById('tela-veiculo').classList.add('hidden');
  window.scrollTo(0,0);
}

async function abrirVeiculoPorOS(osId){
  const {data:os} = await getSB().from('ordens_servico').select('veiculo_id,veiculos(*),clientes(*)').eq('id',osId).single();
  if(os?.veiculos) abrirVeiculo(os.veiculos, os.clientes);
}

// ── TELA VEÍCULO ───────────────────────────────────────────
let _veiculoAtual = null;

async function abrirVeiculo(veic, cli){
  _veiculoAtual = veic;
  _clienteAtual = cli || _clienteAtual;

  document.getElementById('back-veiculo-label').textContent = cli ? `${cli.nome?.split(' ')[0] || 'Voltar'}` : 'Voltar';

  const el = document.getElementById('veiculo-content');
  el.innerHTML = '<div class="loading"><div class="loading-spin">⏳</div></div>';

  document.getElementById('tela-busca').classList.add('hidden');
  document.getElementById('tela-cliente').classList.add('hidden');
  document.getElementById('tela-veiculo').classList.remove('hidden');
  window.scrollTo(0,0);

  await renderVeiculo(el, veic, _clienteAtual);
}

async function renderVeiculo(el, veic, cli){
  const sb = getSB();
  const [
    {data:osList},
    {data:prevList}
  ] = await Promise.all([
    sb.from('ordens_servico').select('*,os_itens(*)').eq('veiculo_id', veic.id).order('data_entrada',{ascending:false}),
    sb.from('plano_preventivo').select('*').eq('veiculo_id', veic.id).order('proxima_revisao')
  ]);

  // OS ativa (última não paga/cancelada)
  const osAtiva = (osList||[]).find(o=>!['pago','cancelado'].includes(o.status));

  const statusInfo = {
    'na_fila':        {emoji:'🕐',txt:'Na Fila',             desc:'Seu veículo está na fila de atendimento.',cor:'na_fila'},
    'em_manutencao':  {emoji:'🔧',txt:'Em Manutenção',       desc:'Nossos mecânicos estão trabalhando no seu veículo.',cor:'em_manutencao'},
    'aguardando_peca':{emoji:'⏳',txt:'Aguardando Peça',     desc:'Estamos aguardando a chegada de uma peça.',cor:'aguardando_peca'},
    'pronto_retirada':{emoji:'✅',txt:'Pronto para Retirada!',desc:'Seu veículo está pronto! Pode vir buscar.',cor:'pronto_retirada'},
  };

  // Telefone da oficina para WhatsApp
  const telOficina = '5500000000000'; // será substituído pelas configs

  const {data:cfgs} = await sb.from('configuracoes').select('chave,valor');
  const cfg = {}; (cfgs||[]).forEach(c=>cfg[c.chave]=c.valor);
  const nomeOficina = cfg['nome_mecanica'] || 'Oficina';
  const telOf = cfg['telefone_mecanica']?.replace(/\D/g,'') || '';

  // Header do veículo
  let html = `
    <div class="card" style="margin-bottom:.85rem">
      <div class="card-body">
        <div style="display:flex;align-items:center;gap:.85rem">
          <div style="background:var(--navy);color:#fff;font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;padding:.4rem .85rem;border-radius:.5rem;letter-spacing:.07em">${veic.placa}</div>
          <div>
            <div style="font-weight:700;font-size:1rem">${veic.marca||''} ${veic.modelo||''}</div>
            <div style="font-size:.78rem;color:var(--muted)">${veic.ano||''} ${veic.cor?'• '+veic.cor:''} ${veic.combustivel?'• '+veic.combustivel:''}</div>
          </div>
        </div>
      </div>
    </div>`;

  // Status da OS ativa
  if(osAtiva){
    const s = statusInfo[osAtiva.status] || {emoji:'🔧',txt:osAtiva.status,desc:'',cor:''};
    html += `
      <div class="status-destaque ${s.cor}">
        <div class="status-emoji">${s.emoji}</div>
        <div class="status-titulo">${s.txt}</div>
        <div class="status-sub">${s.desc}</div>
        ${osAtiva.data_previsao?`<div style="font-size:.78rem;color:var(--muted);margin-top:.35rem">Previsão: ${brData(osAtiva.data_previsao)}</div>`:''}
        <div style="font-size:.75rem;color:var(--muted);margin-top:.2rem">OS ${osAtiva.numero}</div>
      </div>`;
  }

  // Botão agendar via WhatsApp
  if(telOf){
    const msg = encodeURIComponent(`Olá ${nomeOficina}! Gostaria de agendar uma revisão para meu veículo ${veic.placa} (${veic.marca||''} ${veic.modelo||''}).`);
    html += `<a class="btn btn-whatsapp btn-full" style="margin-bottom:.85rem" href="https://wa.me/55${telOf}?text=${msg}" target="_blank">💬 Agendar Revisão via WhatsApp</a>`;
  }

  // TABS
  html += `
    <div class="tabs">
      <button class="tab active" onclick="switchTabVeic('tab-historico',this)">📋 Histórico</button>
      <button class="tab" onclick="switchTabVeic('tab-preventivo',this)">🛡️ Preventivo</button>
      <button class="tab" onclick="switchTabVeic('tab-avaliar',this)">⭐ Avaliar</button>
    </div>`;

  // TAB HISTÓRICO
  const osHtml = (osList||[]).length === 0
    ? '<div class="empty"><div class="empty-icon">📋</div><div class="empty-msg">Nenhuma OS encontrada.</div></div>'
    : (osList||[]).map(os=>{
        const itensSvcs = (os.os_itens||[]).filter(i=>i.tipo==='servico');
        const itensPecs = (os.os_itens||[]).filter(i=>i.tipo==='peca');
        const badgeMap  = {'na_fila':'badge-na-fila','em_manutencao':'badge-manutencao','aguardando_peca':'badge-aguardando','pronto_retirada':'badge-pronto','pago':'badge-pago','cancelado':'badge-cancelado'};
        const labelMap  = {'na_fila':'Na Fila','em_manutencao':'Em Manutenção','aguardando_peca':'Aguard. Peça','pronto_retirada':'Pronto','pago':'Pago','cancelado':'Cancelado'};
        return `
          <div class="os-item">
            <div style="display:flex;justify-content:space-between;align-items:flex-start">
              <div>
                <div class="os-num">OS ${os.numero}</div>
                <div class="os-data">📅 ${brData(os.data_entrada)}</div>
              </div>
              <span class="badge ${badgeMap[os.status]||''}">${labelMap[os.status]||os.status}</span>
            </div>
            ${itensSvcs.length?`<div class="os-servicos">${itensSvcs.map(i=>`<div class="os-servico-row">🔧 ${i.descricao}</div>`).join('')}</div>`:''}
            ${itensPecs.length?`<div class="os-servicos">${itensPecs.map(i=>`<div class="os-servico-row">🔩 ${i.descricao}</div>`).join('')}</div>`:''}
            <div style="display:flex;justify-content:space-between;align-items:center;margin-top:.5rem">
              <div class="os-total">${brl(os.valor_total)}</div>
              ${os.avaliacao?`<div style="font-size:.85rem">${'⭐'.repeat(os.avaliacao)}</div>`:''}
            </div>
          </div>`;
      }).join('');

  // TAB PREVENTIVO
  const hoje = new Date(isoHoje());
  const prevHtml = (prevList||[]).length === 0
    ? '<div class="empty"><div class="empty-icon">🛡️</div><div class="empty-msg">Nenhum item no plano preventivo.</div></div>'
    : (prevList||[]).map(p=>{
        let cor='#10b981', txt='Em dia ✅', badgeCls='';
        if(p.proxima_revisao){
          const d = new Date(p.proxima_revisao);
          const diff = Math.round((d-hoje)/86400000);
          if(diff < 0)      { cor='#ef4444'; txt=`${Math.abs(diff)}d atrasado 🔴`; badgeCls='badge-cancelado'; }
          else if(diff<=30) { cor='#f59e0b'; txt=`Vence em ${diff}d ⚠️`;           badgeCls='badge-aguardando'; }
          else              { cor='#10b981'; txt=`OK — ${brData(p.proxima_revisao)}`;badgeCls='badge-pronto'; }
        }
        return `
          <div class="prev-item">
            <div class="prev-dot" style="background:${cor}"></div>
            <div style="flex:1">
              <div class="prev-nome">${p.item}</div>
              <div class="prev-data">Última: ${brData(p.ultima_revisao)} • Próxima: ${brData(p.proxima_revisao)}</div>
            </div>
            <span class="badge ${badgeCls} prev-badge" style="font-size:.68rem">${txt}</span>
          </div>`;
      }).join('');

  // TAB AVALIAR — buscar OS pagas sem avaliação
  const osSemAval = (osList||[]).filter(o=>o.status==='pago'&&!o.avaliacao);
  const avalHtml = osSemAval.length === 0
    ? '<div class="empty"><div class="empty-icon">⭐</div><div class="empty-msg">Nenhuma OS pendente de avaliação.<br>Obrigado pelo seu feedback! 🙏</div></div>'
    : osSemAval.map(os=>`
        <div style="padding:.85rem;border:1.5px solid var(--border);border-radius:.65rem;margin-bottom:.75rem">
          <div style="font-weight:700;margin-bottom:.2rem">OS ${os.numero}</div>
          <div style="font-size:.78rem;color:var(--muted);margin-bottom:.75rem">📅 ${brData(os.data_conclusao||os.data_entrada)}</div>
          <div style="font-size:.82rem;font-weight:600;text-align:center;margin-bottom:.35rem">Como foi o serviço?</div>
          <div class="star-wrap" id="stars-${os.id}">
            ${[1,2,3,4,5].map(i=>`<button class="star-btn" onclick="selecionarEstrela('${os.id}',${i})">⭐</button>`).join('')}
          </div>
          <textarea id="comentario-${os.id}" placeholder="Deixe um comentário (opcional)..." style="width:100%;padding:.6rem .85rem;border:1.5px solid var(--border);border-radius:.5rem;font-size:.88rem;font-family:'DM Sans',sans-serif;resize:none;min-height:70px;outline:none;margin-bottom:.5rem"></textarea>
          <button class="btn btn-primary btn-full" onclick="enviarAvaliacao('${os.id}')">Enviar Avaliação</button>
        </div>`).join('');

  html += `
    <div id="tab-historico" class="tab-content active">
      <div class="card">${osHtml}</div>
    </div>
    <div id="tab-preventivo" class="tab-content">
      <div class="card">${prevHtml}</div>
      ${telOf?`<a class="btn btn-whatsapp btn-full" style="margin-top:.5rem" href="https://wa.me/55${telOf}?text=${encodeURIComponent(`Olá! Gostaria de agendar a revisão do meu veículo ${veic.placa}.`)}" target="_blank">💬 Agendar via WhatsApp</a>`:''}
    </div>
    <div id="tab-avaliar" class="tab-content">
      ${avalHtml}
    </div>
  `;

  el.innerHTML = html;
}

function switchTabVeic(id, btn){
  document.querySelectorAll('#veiculo-content .tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('#veiculo-content .tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id)?.classList.add('active');
  btn.classList.add('active');
}

// ── AVALIAÇÃO ──────────────────────────────────────────────
let _estrelas = {};
function selecionarEstrela(osId, nota){
  _estrelas[osId] = nota;
  const wrap = document.getElementById('stars-'+osId);
  if(!wrap) return;
  wrap.querySelectorAll('.star-btn').forEach((btn,i)=>{
    btn.classList.toggle('ativo', i < nota);
  });
}

async function enviarAvaliacao(osId){
  const nota = _estrelas[osId];
  if(!nota){ toast('Selecione uma nota de 1 a 5 estrelas','error'); return; }
  const comentario = document.getElementById('comentario-'+osId)?.value.trim()||'';
  const {error} = await getSB().from('ordens_servico').update({
    avaliacao:nota, comentario_avaliacao:comentario
  }).eq('id', osId);
  if(error){ toast('Erro ao enviar avaliação','error'); return; }
  toast('Avaliação enviada! Obrigado 🙏','success');
  // Recarregar aba avaliar
  if(_veiculoAtual){
    await renderVeiculo(document.getElementById('veiculo-content'), _veiculoAtual, _clienteAtual);
    // Manter na aba avaliar
    switchTabVeic('tab-avaliar', document.querySelectorAll('#veiculo-content .tab')[2]);
  }
}

// ── NAVEGAÇÃO ──────────────────────────────────────────────
function voltarBusca(){
  document.getElementById('tela-busca').classList.remove('hidden');
  document.getElementById('tela-cliente').classList.add('hidden');
  document.getElementById('tela-veiculo').classList.add('hidden');
  document.getElementById('busca-resultado').innerHTML = '';
  document.getElementById('busca-input').value = '';
  window.scrollTo(0,0);
}

function voltarCliente(){
  if(_clienteAtual){
    document.getElementById('tela-busca').classList.add('hidden');
    document.getElementById('tela-cliente').classList.remove('hidden');
    document.getElementById('tela-veiculo').classList.add('hidden');
  } else {
    voltarBusca();
  }
  window.scrollTo(0,0);
}
</script>
</body>
</html>
